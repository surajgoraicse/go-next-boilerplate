services:
  postgres:
    container_name: postgres
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${DB_USER:?ERROR-DB_USER is not set}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?ERROR-DB_PASSWORD is not set}
      POSTGRES_DB: ${DB_NAME:?ERROR-DB_NAME is not set}
    ports:
      - 5434:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data

  migrate:
    container_name: go_migrate
    image: migrate/migrate:v4.17.0
    volumes:
      - type: bind
        source: ./internal/db/migrations
        target: /migrations
    depends_on:
      - postgres
    restart: on-failure

  # ── Observability ────────────────────────────────────────────────────────────

  prometheus:
    container_name: prometheus
    image: prom/prometheus:v2.51.0
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    extra_hosts:
      # Lets Prometheus reach the Go app running on the Docker host
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  grafana:
    container_name: grafana
    image: grafana/grafana:10.4.2
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      # Disable sign-up / anonymous access in production
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3005:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgres_data:
  grafana_data:
